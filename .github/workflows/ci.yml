name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        compiler: [gcc, clang]
        preset: [release-strict, debug-full]
        exclude:
          - os: macos-latest
            compiler: gcc

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Conan
        run: pipx install conan

      - name: Install lcov (Linux)
        if: runner.os == 'Linux' && matrix.preset == 'debug-full'
        run: sudo apt-get install -y lcov

      - name: Install lcov (macOS)
        if: runner.os == 'macOS' && matrix.preset == 'debug-full'
        run: brew install lcov

      - name: Configure Conan profile
        run: conan profile detect --force

      - name: Install dependencies
        run: |
          BUILD_TYPE=$(echo "${{ matrix.preset }}" | grep -q "release" && echo "Release" || echo "Debug")
          conan install . --build=missing -s build_type=$BUILD_TYPE

      - name: Configure CMake
        run: cmake --preset ${{ matrix.preset }}
        env:
          CC: ${{ matrix.compiler == 'gcc' && 'gcc' || 'clang' }}
          CXX: ${{ matrix.compiler == 'gcc' && 'g++' || 'clang++' }}

      - name: Build
        run: cmake --build --preset ${{ matrix.preset }}

      - name: Test
        run: ctest --preset ${{ matrix.preset }} --output-on-failure

      - name: Generate coverage report
        if: matrix.preset == 'debug-full'
        run: cmake --build --preset debug-full --target coverage

      - name: Upload coverage to Codecov
        if: matrix.preset == 'debug-full' && matrix.compiler == 'clang' && runner.os == 'Linux'
        uses: codecov/codecov-action@v4
        with:
          files: ./build/debug-full/coverage/coverage_filtered.info
          fail_ci_if_error: true
          verbose: true
