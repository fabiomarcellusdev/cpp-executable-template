name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        compiler: [gcc, clang]
        preset: [release-strict, debug-full]
        exclude:
          - os: macos-latest
            compiler: gcc

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Conan
        run: pipx install conan

      - name: Install GCC 13 (Linux)
        if: runner.os == 'Linux' && matrix.compiler == 'gcc'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-13 g++-13 gcov-13
          # Set as default gcc/g++/gcov
          sudo update-alternatives --install /usr/bin/gcc gcc /usr/bin/gcc-13 100
          sudo update-alternatives --install /usr/bin/g++ g++ /usr/bin/g++-13 100
          sudo update-alternatives --install /usr/bin/gcov gcov /usr/bin/gcov-13 100
          sudo update-alternatives --set gcc /usr/bin/gcc-13
          sudo update-alternatives --set g++ /usr/bin/g++-13
          sudo update-alternatives --set gcov /usr/bin/gcov-13

      - name: Install lcov (Linux)
        if: runner.os == 'Linux' && matrix.preset == 'debug-full'
        run: sudo apt-get install -y lcov

      - name: Install lcov (macOS)
        if: runner.os == 'macOS' && matrix.preset == 'debug-full'
        run: brew install lcov

      - name: Configure Conan profile
        run: conan profile detect --force

      - name: Install dependencies
        run: |
          BUILD_TYPE=$(echo "${{ matrix.preset }}" | grep -q "release" && echo "Release" || echo "Debug")
          conan install . --build=missing -s build_type=$BUILD_TYPE -s compiler.cppstd=23

      - name: Configure CMake
        run: cmake --preset ${{ matrix.preset }}
        env:
          CC: ${{ matrix.compiler == 'gcc' && (runner.os == 'Linux' && 'gcc-13' || 'gcc') || 'clang' }}
          CXX: ${{ matrix.compiler == 'gcc' && (runner.os == 'Linux' && 'g++-13' || 'g++') || 'clang++' }}

      - name: Verify C++23 standard
        run: |
          echo "=== Compiler Information ==="
          ${{ matrix.compiler == 'gcc' && (runner.os == 'Linux' && 'g++-13' || 'g++') || 'clang++' }} --version
          echo ""
          echo "=== Checking C++ standard in compile commands ==="
          if [ -f "build/${{ matrix.preset }}/compile_commands.json" ]; then
            # Extract and display C++ standard flags
            grep -o '\-std=[^ "]*' "build/${{ matrix.preset }}/compile_commands.json" | sort -u || echo "No -std flag found"
            # Verify C++23 is being used
            if grep -q '\-std=c++2[3b]' "build/${{ matrix.preset }}/compile_commands.json"; then
              echo "✓ C++23 standard verified"
            else
              echo "✗ C++23 standard NOT found in compile commands"
              exit 1
            fi
          else
            echo "Warning: compile_commands.json not found"
          fi

      - name: Build
        run: |
          # Clean any stale coverage data to prevent gcov version mismatches
          find build -name "*.gcda" -delete 2>/dev/null || true
          find build -name "*.gcno" -delete 2>/dev/null || true
          cmake --build --preset ${{ matrix.preset }}

      - name: Test
        run: ctest --preset ${{ matrix.preset }} --output-on-failure

      - name: Generate coverage report
        if: matrix.preset == 'debug-full'
        run: cmake --build --preset debug-full --target coverage

      - name: Upload coverage to Codecov
        if: matrix.preset == 'debug-full' && matrix.compiler == 'clang' && runner.os == 'Linux'
        uses: codecov/codecov-action@v4
        with:
          files: ./build/debug-full/coverage/coverage_filtered.info
          fail_ci_if_error: true
          verbose: true
